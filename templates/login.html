<div class="auth-page">
  <div class="auth-card">
    <h1>Login</h1>
    <p class="auth-subtitle">Welcome back to the forum</p>

    {{#if error}}
      <div class="alert alert-error">{{error}}</div>
    {{/if}}

    <form method="POST" action="/login" class="auth-form">
      <div class="form-group">
        <label for="identifier">Email or Username</label>
        <input type="text" id="identifier" name="identifier" value="{{identifier}}" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a href="/register">Register</a></p>
  </div>
</div>
